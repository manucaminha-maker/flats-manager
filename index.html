
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flats Manager</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Flats Manager</h1>

<div class="alerts">
<h2>Alertas</h2>
<div id="alerts"></div>
</div>

<div class="map">
<h2>Mapa dos Flats</h2>
<div id="map"></div>
</div>

<div class="form">
<h2>Nova Reserva</h2>

<label>Flat</label>
<select id="apt">
<option>008A</option>
<option>223B</option>
<option>210D</option>
<option>114C</option>
<option>121A</option>
</select>

<label>Hóspede</label>
<input id="guest">

<label>Check-in</label>
<input id="checkin" type="date">

<label>Check-out</label>
<input id="checkout" type="date">

<label>Valor da reserva</label>
<input id="value" type="number">

<label>Operadora</label>
<select id="operator">
<option>Airbnb</option>
<option>Booking</option>
<option>Direto</option>
<option>Decolar</option>
<option>Expedia</option>
<option>Outro</option>
</select>

<label>Limpeza</label>
<select id="cleaning">
<option value="80">80</option>
<option value="120">120</option>
<option value="150">150</option>
</select>

<button onclick="addReservation()">Salvar</button>

</div>

<h2>Reservas</h2>
<table id="table">
<thead>
<tr>
<th>Flat</th>
<th>Hóspede</th>
<th>Check-in</th>
<th>Check-out</th>
<th>Valor</th>
<th>Líquido</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h2>Resumo Financeiro</h2>
<div id="finance"></div>

<script src="app.js"></script>

</body>
</html>
