<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Flats Manager</title>

<style>

body{
font-family:Arial;
background:#f5f6fa;
margin:20px;
}

input,select{
padding:6px;
width:100%;
}

button{
padding:6px;
cursor:pointer;
}

table{
border-collapse:collapse;
width:100%;
background:white;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:6px;
text-align:center;
}

.flat{
background:#eee;
padding:6px;
margin:4px;
display:inline-block;
border-radius:4px;
}

.box{
background:white;
padding:10px;
margin-bottom:15px;
}

.calendar td{
width:25px;
height:25px;
}

.free{
background:#dff9fb;
}

.occupied{
background:#ff7675;
color:white;
}

.checkin{
background:#f6e58d;
}

.checkout{
background:#ffbe76;
}

</style>

</head>

<body>

<h1>Flats Manager</h1>

<div class="box">
<h2>Alertas</h2>
<div id="alerts"></div>
</div>

<div class="box">
<h2>Faxinas do Dia</h2>
<div id="cleaningList"></div>
</div>

<div class="box">
<h2>Mapa dos Flats</h2>
<div id="map"></div>
</div>

<div class="box">
<h2>Mapa de Ocupação</h2>
<div id="calendar"></div>
</div>

<div class="box">

<h2>Nova Reserva</h2>

<label>Flat</label>
<select id="apt">
<option>008A</option>
<option>223B</option>
<option>210D</option>
<option>114C</option>
<option>121A</option>
</select>

<label>Hóspede</label>
<input id="guest">

<label>Check-in</label>
<input id="checkin" type="date">

<label>Check-out</label>
<input id="checkout" type="date">

<label>Valor</label>
<input id="value" type="number">

<label>Operadora</label>
<select id="operator">
<option>Airbnb</option>
<option>Booking</option>
<option>Direto</option>
<option>Decolar</option>
<option>Expedia</option>
<option>Outro</option>
</select>

<label>Limpeza</label>
<select id="cleaning">
<option value="80">80</option>
<option value="120">120</option>
<option value="150">150</option>
</select>

<button onclick="addReservation()">Salvar Reserva</button>

</div>

<h2>Reservas</h2>

<table id="table">

<thead>
<tr>
<th>Flat</th>
<th>Hóspede</th>
<th>Check-in</th>
<th>Check-out</th>
<th>Valor</th>
<th>Líquido</th>
<th>Ações</th>
</tr>
</thead>

<tbody></tbody>

</table>

<h2>Resumo Financeiro</h2>
<div id="finance"></div>

<script type="module" src="app.js"></script>

</body>
</html>
